<!-- version 00001 -->
<!-- 
  ไฟล์: asset-detail.html
  หน้าที่: Template แสดงรายละเอียดทรัพย์สินแบบ Modal
  รองรับ: ทั้ง Desktop และ Mobile
-->

<div id="assetModal" class="modal-overlay" onclick="closeAssetDetail(event)">
  <div class="modal-container" onclick="event.stopPropagation()">
    
    <!-- ปุ่มปิด -->
    <button onclick="closeAssetDetail()" class="modal-close-btn">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <!-- หัวข้อรายละเอียด -->
    <div class="modal-header">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
          </svg>
        </div>
        <div>
          <p class="text-xs text-slate-400 font-mono" id="detail-id">#XXXXXXXX-XXXX</p>
          <h3 class="text-xl font-bold text-slate-800" id="detail-type">ชื่อทรัพย์สิน</h3>
        </div>
      </div>
      <span id="detail-status" class="px-3 py-1 rounded-full text-[10px] font-bold">สถานะ</span>
    </div>

    <!-- เนื้อหารายละเอียด -->
    <div class="modal-body">
      
      <!-- แถวที่ 1: ยี่ห้อ / รุ่น / Serial Number -->
      <div class="detail-section">
        <p class="detail-label">ข้อมูลจำเพาะ</p>
        <div class="detail-grid-3">
          <div>
            <p class="detail-sub-label">ยี่ห้อ</p>
            <p class="detail-value" id="detail-brand">-</p>
          </div>
          <div>
            <p class="detail-sub-label">รุ่น</p>
            <p class="detail-value" id="detail-model">-</p>
          </div>
          <div>
            <p class="detail-sub-label">Serial Number</p>
            <p class="detail-value" id="detail-serial">-</p>
          </div>
        </div>
      </div>

      <!-- แถวที่ 2: หน่วยงาน / สถานที่ตั้ง / ผู้รับผิดชอบ -->
      <div class="detail-section">
        <p class="detail-label">หน่วยงานและผู้รับผิดชอบ</p>
        <div class="detail-grid-2">
          <div>
            <p class="detail-sub-label">หน่วยงาน</p>
            <p class="detail-value" id="detail-dept">-</p>
          </div>
          <div>
            <p class="detail-sub-label">สถานที่ตั้ง</p>
            <p class="detail-value" id="detail-location">-</p>
          </div>
          <div>
            <p class="detail-sub-label">ผู้รับผิดชอบ</p>
            <p class="detail-value" id="detail-owner">-</p>
          </div>
        </div>
      </div>

      <!-- แถวที่ 3: ข้อมูลเพิ่มเติม -->
      <div class="detail-section">
        <p class="detail-label">ข้อมูลเพิ่มเติม</p>
        <div class="detail-grid-2">
          <div>
            <p class="detail-sub-label">วันที่ได้มา</p>
            <p class="detail-value" id="detail-acquired">-</p>
          </div>
          <div>
            <p class="detail-sub-label">ราคา</p>
            <p class="detail-value" id="detail-price">-</p>
          </div>
          <div>
            <p class="detail-sub-label">อายุการใช้งาน</p>
            <p class="detail-value" id="detail-age">-</p>
          </div>
        </div>
      </div>

      <!-- ส่วนรูปภาพ (เตรียมไว้ รองรับอนาคต) -->
      <div class="detail-section" id="detail-image-section" style="display: none;">
        <p class="detail-label">รูปภาพประกอบ</p>
        <div class="detail-image-container" id="detail-images">
          <!-- รูปภาพจะถูกเพิ่มที่นี่ -->
        </div>
      </div>

      <!-- หมายเหตุ -->
      <div class="detail-section">
        <p class="detail-label">หมายเหตุ</p>
        <p class="detail-value text-slate-500 italic" id="detail-remark">-</p>
      </div>

    </div>

    <!-- ส่วนท้าย Modal (ปุ่มลิงก์) -->
    <div class="modal-footer">
      <a href="#" id="detail-url" target="_blank" class="modal-link-btn">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
        </svg>
        <span>ดูข้อมูลเพิ่มเติม</span>
      </a>
      <button onclick="closeAssetDetail()" class="modal-close-bottom-btn">ปิด</button>
    </div>

  </div>
</div>

<!-- สไตล์ inline เผื่อ CSS ยังไม่โหลด -->
<style>
  /* Modal Overlay */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease-out;
  }
  
  /* Modal Container */
  .modal-container {
    position: relative;
    background: white;
    border-radius: 24px;
    width: 90%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    animation: slideUp 0.3s ease-out;
  }
  
  /* ปุ่มปิด */
  .modal-close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: white;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #e2e8f0;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
  }
  
  .modal-close-btn:hover {
    background: #f1f5f9;
    transform: scale(1.05);
  }
  
  /* Header */
  .modal-header {
    padding: 24px 24px 16px 24px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  
  /* Body */
  .modal-body {
    padding: 20px 24px;
  }
  
  /* Footer */
  .modal-footer {
    padding: 16px 24px 24px 24px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  
  /* Detail Sections */
  .detail-section {
    margin-bottom: 24px;
  }
  
  .detail-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #12643a;
    margin-bottom: 12px;
  }
  
  .detail-sub-label {
    font-size: 10px;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 4px;
  }
  
  .detail-value {
    font-size: 14px;
    font-weight: 500;
    color: #1e293b;
  }
  
  .detail-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  
  .detail-grid-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  
  /* Link Button */
  .modal-link-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #f1f5f9;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #12643a;
    text-decoration: none;
    transition: all 0.2s;
  }
  
  .modal-link-btn:hover {
    background: #e2e8f0;
  }
  
  .modal-close-bottom-btn {
    padding: 10px 20px;
    background: #12643a;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .modal-close-bottom-btn:hover {
    background: #0a4a2c;
  }
  
  /* Image Container */
  .detail-image-container {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  
  .detail-image {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    cursor: pointer;
  }
  
  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  /* Responsive */
  @media (max-width: 640px) {
    .modal-container {
      width: 95%;
      max-height: 90vh;
    }
    
    .modal-header {
      padding: 20px 16px 12px 16px;
    }
    
    .modal-body {
      padding: 16px;
    }
    
    .detail-grid-3,
    .detail-grid-2 {
      gap: 12px;
    }
    
    .detail-value {
      font-size: 13px;
    }
  }
</style>
