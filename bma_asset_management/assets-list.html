<!-- 
  ไฟล์: assets-list.html
  หน้าที่: Template แสดงรายการทรัพย์สิน (ตารางสำหรับ Desktop และ การ์ดสำหรับ Mobile)
  ฟังก์ชันเด่น: รองรับการค้นหา (Filter) ข้อมูลแบบเรียลไทม์
-->

<!-- ส่วนตารางสำหรับ Desktop -->
<div class="hidden md:block p-8 animate-in">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white">
      <h3 class="font-bold text-slate-700 flex items-center gap-2">
          <span class="w-2 h-6 bg-emerald-600 rounded-full"></span>
          บัญชีรายการทรัพย์สิน
      </h3>
      <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ค้นหาเลขครุภัณฑ์, รายการ, หน่วยงาน..." 
             class="px-4 py-2 border border-slate-200 rounded-lg text-sm w-80 focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b border-slate-100">
          <tr>
            <th class="px-6 py-4">เลขครุภัณฑ์</th>
            <th class="px-6 py-4">รายการ</th>
            <th class="px-6 py-4">ยี่ห้อ/รุ่น/SN</th>
            <th class="px-6 py-4">หน่วยงาน/ผู้รับผิดชอบ</th>
            <th class="px-6 py-4 text-center">สถานะ</th>
            <th class="px-6 py-4 text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-slate-100">
          <!-- ข้อมูลจะถูกโหลดโดยฟังก์ชัน renderDesktopTable ใน assets-list.js -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ส่วนการแสดงผลสำหรับ Mobile -->
<div class="block md:hidden p-4 pb-20 animate-in">
  <div class="mb-4 sticky top-0 bg-slate-50 pt-2 pb-2 z-10">
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ค้นหาทรัพย์สิน..." 
           class="w-full px-4 py-3 rounded-xl border border-slate-200 shadow-sm text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
  </div>
  <div id="mobile-list" class="space-y-4">
    <!-- ข้อมูลจะถูกโหลดโดยฟังก์ชัน renderMobileTable ใน assets-list.js -->
  </div>
</div>
