<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        tailwind.config = {
            theme: {

</head>
<body class="bg-slate-50 min-h-screen flex flex-col md:flex-row font-['Sarabun']">

    <!-- Loading Screen: หน้าจอกำลังโหลดข้อมูล -->
    <div id="loading" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="spinner mb-6"></div>
        <p id="loading-text" class="text-slate-500 font-bold animate-pulse">กำลังดึงข้อมูลทรัพย์สินจากระบบ...</p>
    </div>

    <!-- Sidebar: สำหรับหน้าจอ Desktop -->
    <nav class="hidden md:flex flex-col w-72 bkk-sidebar text-white p-8 space-y-4 shadow-xl">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-emerald-800 font-black text-xl">B</div>
            <h1 class="text-xl font-bold tracking-tight">BMA ASSETS</h1>
        </div>
        
        <button id="btn-dashboard" onclick="switchTab('dashboard')"

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            ภาพรวมระบบ
        </button>
        
        <button id="btn-inventory" onclick="switchTab('inventory')"

    <main class="flex-1 flex flex-col min-h-0 overflow-hidden relative">
        <header class="bg-white border-b border-slate-100 p-6 flex justify-between items-center z-10">
            <h2 id="page-title" class="text-xl font-bold text-slate-800 tracking-tight">Dashboard</h2>
        </header>
        
        <div id="main-content" class="flex-1 overflow-y-auto">
            <!-- ข้อมูลจาก dashboard.html หรือ assets-list.html จะถูกฉีดที่นี่ -->
        </div>

        <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 pb-6 z-50">
            <button id="m-btn-dashboard" onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>

                <span class="text-[10px] font-bold">รายการ</span>
            </button>
        </div>

    <!-- Scripts: ลำดับการโหลดสำคัญมาก -->
    <script src="js/api-config.js"></script>    <!-- ตั้งค่า URL API -->
    <script src="js/dashboard.js"></script>     <!-- Logic ของหน้าสรุปผล -->
    <script src="js/assets-list.js"></script>   <!-- Logic ของหน้าแสดงรายการ -->
    <script src="js/index.js"></script>         <!-- ตัวควบคุมหลัก -->
