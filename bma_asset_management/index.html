<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMA Assets Management</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12643a">
  
  <!-- Apple Touch Icons - Updated path to icons/ folder -->
  <link rel="apple-touch-icon" href="icons/bma_asset_apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/bma_asset_apple-touch-icon-ipad.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

  <!-- Loading Screen -->
  <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[100] transition-opacity duration-500">
    <div class="spinner mb-4"></div>
    <p id="loading-text" class="text-emerald-800 font-bold animate-pulse">กำลังเรียกข้อมูล BMA Assets...</p>
  </div>

  <!-- Sidebar -->
  <aside class="w-64 bkk-sidebar text-white flex-shrink-0 hidden md:flex flex-col">
    <div class="p-6 flex items-center gap-3 border-b border-emerald-700/50">
      <div class="bg-white p-1 rounded-lg shadow-sm">
        <img src="icons/bma_asset_icon-192.png" alt="BMA Logo" class="w-8 h-8">
      </div>
      <h1 class="font-bold text-sm tracking-tight leading-tight">BMA Assets<br>Management</h1>
    </div>
    
    <nav class="flex-1 p-4 space-y-2 mt-4">
      <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        Dashboard
      </button>
      <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        รายการทรัพย์สิน
      </button>
    </nav>

    <div class="p-6 border-t border-emerald-700/50 text-[10px] opacity-60">
      <p>Version 00027</p>
      <p id="last-update-sidebar">อัปเดต: -</p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0">
      <div class="md:hidden flex items-center gap-2">
        <img src="icons/bma_asset_icon-192.png" alt="Logo" class="w-6 h-6">
        <span class="font-bold text-[#12643a]">BMA Assets</span>
      </div>
      <h2 id="page-title" class="hidden md:block font-bold text-slate-700">Dashboard</h2>
      <div class="flex items-center gap-4">
        <span id="connection-status" class="flex items-center gap-1.5 text-xs font-medium text-[#12643a] bg-emerald-50 px-3 py-1 rounded-full">
          <span class="w-2 h-2 bg-[#12643a] rounded-full animate-pulse"></span>
          Connected
        </span>
      </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8">
      <!-- ส่วนนี้จะถูกแทนที่ด้วยเนื้อหาจากไฟล์ d_dashboard.html หรือ d_assets-list.html -->
    </main>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    let globalData = [];
    let charts = {};
    let currentTab = 'dashboard';

    async function fetchData() {
      try {
        const response = await fetch(WEB_APP_URL);
        globalData = await response.json();
        if (globalData.error) throw new Error(globalData.error);
        
        await switchTab('dashboard');
      } catch (err) {
        document.getElementById('loading-text').innerHTML = 
          `<span class="text-red-600">การเชื่อมต่อผิดพลาด: ${err.message}</span><br>
           <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-[#12643a] text-white rounded-xl text-sm shadow-lg">ลองอีกครั้ง</button>`;
      }
    }

    async function switchTab(tabId) {
      currentTab = tabId;
      const mainContent = document.getElementById('main-content');
      const fileToLoad = tabId === 'dashboard' ? 'd_dashboard.html' : 'd_assets-list.html';
      
      try {
        const response = await fetch(fileToLoad);
        const html = await response.text();
        mainContent.innerHTML = html;

        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        const btnId = tabId === 'dashboard' ? 'btn-dashboard' : 'btn-inventory';
        const targetBtn = document.getElementById(btnId);
        if(targetBtn) targetBtn.classList.add('active');
        
        document.getElementById('page-title').innerText = tabId === 'dashboard' ? 'Dashboard' : 'รายการทรัพย์สิน';

        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => { document.getElementById('loading').classList.add('hidden'); }, 500);

        renderContent();
      } catch (err) {
        console.error("Failed to load page:", err);
      }
    }

    function renderContent() {
      const timeString = new Date().toLocaleString('th-TH');
      const sidebarUpdate = document.getElementById('last-update-sidebar');
      if(sidebarUpdate) sidebarUpdate.innerText = `อัปเดต: ${timeString}`;

      if (currentTab === 'dashboard') {
        renderDashboard();
      } else {
        renderTable(globalData);
      }
    }

    function renderDashboard() {
      const total = globalData.length;
      const normal = globalData.filter(d => ['ปกติ','ใช้งานได้','พร้อมใช้'].some(s => String(d.status).includes(s))).length;
      const broken = globalData.filter(d => ['ชำรุด','จำหน่าย','พัง','ซ่อม'].some(s => String(d.status).includes(s))).length;

      if(document.getElementById('total-val')) document.getElementById('total-val').innerText = total.toLocaleString();
      if(document.getElementById('normal-val')) document.getElementById('normal-val').innerText = normal.toLocaleString();
      if(document.getElementById('broken-val')) document.getElementById('broken-val').innerText = broken.toLocaleString();

      const typeData = groupAndSort(globalData, 'type', 10);
      const deptData = groupAndSort(globalData, 'dept', 8);

      updateChart('typeChart', 'doughnut', Object.keys(typeData), Object.values(typeData), ['#064e3b', '#065f46', '#047857', '#059669', '#10b981', '#34d399', '#6ee7b7', '#a7f3d0', '#d1fae5', '#ecfdf5']);
      updateChart('deptChart', 'bar', Object.keys(deptData), Object.values(deptData), '#059669');
    }

    function renderTable(data) {
      const tbody = document.getElementById('table-body');
      if(!tbody) return;

      tbody.innerHTML = data.map(item => `
        <tr class="hover:bg-emerald-50/40 transition">
          <td class="px-6 py-4 font-mono text-[11px] text-slate-500 font-bold">${item.id}</td>
          <td class="px-6 py-4"><div class="font-bold text-slate-700">${item.type}</div></td>
          <td class="px-6 py-4">
            <div class="text-xs text-slate-600 font-medium">${item.brand || '-'}</div>
            <div class="text-[10px] text-slate-400">${item.model || ''}</div>
          </td>
          <td class="px-6 py-4 text-right font-mono text-slate-600">${Number(item.value).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
          <td class="px-6 py-4"><span class="text-xs bg-slate-100 px-2 py-1 rounded text-slate-600">${item.dept}</span></td>
          <td class="px-6 py-4 text-center">
            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${['ปกติ','ใช้งานได้'].some(s => String(item.status).includes(s)) ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}">${item.status}</span>
          </td>
          <td class="px-6 py-4 text-center">
            ${item.url ? `
              <a href="${item.url}" target="_blank" class="inline-flex p-2 text-[#12643a] hover:bg-emerald-50 rounded-full transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
              </a>
            ` : '<span class="text-slate-300">-</span>'}
          </td>
        </tr>
      `).join('');
    }

    function groupAndSort(data, key, limit) {
      const counts = data.reduce((acc, curr) => {
        const val = curr[key] || 'ไม่ระบุ';
        acc[val] = (acc[val] || 0) + 1;
        return acc;
      }, {});
      return Object.fromEntries(Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, limit));
    }

    function updateChart(id, type, labels, data, colors) {
      const canvas = document.getElementById(id);
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      if (charts[id]) charts[id].destroy();
      
      const options = {
        responsive: true, maintainAspectRatio: false,
        plugins: { 
          legend: { 
            position: type === 'doughnut' ? 'right' : 'bottom', 
            labels: { font: { family: 'Sarabun', size: 10 }, usePointStyle: true } 
          } 
        }
      };
      
      if (type === 'bar') {
        options.indexAxis = 'x';
        options.scales = { 
          y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Sarabun', size: 10 } } }, 
          x: { grid: { display: false }, ticks: { font: { family: 'Sarabun', size: 9 }, maxRotation: 45, minRotation: 45 } } 
        };
      }
      
      charts[id] = new Chart(ctx, { type, data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 5, barThickness: 30 }] }, options });
    }

    function filterTable() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const filtered = globalData.filter(item => 
        item.id.toLowerCase().includes(input) || 
        item.type.toLowerCase().includes(input) || 
        item.dept.toLowerCase().includes(input) || 
        item.brand.toLowerCase().includes(input)
      );
      renderTable(filtered);
    }
    window.onload = fetchData;
  </script>
</body>
</html>
