<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BMA Assets Management</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12643a">
  
  <link rel="apple-touch-icon" href="icons/bmaasset_apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/bmaasset_apple-touch-icon-ipad.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

  <!-- Loading Screen -->
  <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[100] transition-opacity duration-500">
    <div class="spinner mb-4"></div>
    <p id="loading-text" class="text-emerald-800 font-bold animate-pulse">กำลังเรียกข้อมูล BMA Assets...</p>
  </div>

  <!-- Sidebar (Desktop Only) -->
  <aside class="w-64 bkk-sidebar text-white flex-shrink-0 hidden md:flex flex-col">
    <div class="p-6 flex items-center gap-3 border-b border-emerald-700/50">
      <div class="bg-white p-1 rounded-lg shadow-sm">
        <img src="icons/bmaasset_icon-192.png" alt="BMA Logo" class="w-8 h-8">
      </div>
      <h1 class="font-bold text-sm tracking-tight leading-tight">BMA Assets<br>Management</h1>
    </div>
    
    <nav class="flex-1 p-4 space-y-2 mt-4">
      <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        Dashboard
      </button>
      <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        รายการทรัพย์สิน
      </button>
    </nav>

    <div class="p-6 border-t border-emerald-700/50 text-[10px] opacity-60">
      <p>Version 00029</p>
      <p id="last-update-sidebar">อัปเดต: -</p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-6 flex-shrink-0">
      <div class="md:hidden flex items-center gap-2">
        <img src="icons/bmaasset_icon-192.png" alt="Logo" class="w-6 h-6">
        <span class="font-bold text-[#12643a]">BMA Assets</span>
      </div>
      <h2 id="page-title" class="hidden md:block font-bold text-slate-700">Dashboard</h2>
      <div class="flex items-center gap-4 text-xs">
        <span id="connection-status" class="flex items-center gap-1.5 font-medium text-[#12643a] bg-emerald-50 px-3 py-1 rounded-full">
          <span class="w-2 h-2 bg-[#12643a] rounded-full animate-pulse"></span>
          Live
        </span>
      </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
      <!-- Content loads here -->
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-3 px-6 z-50">
      <button onclick="switchTab('dashboard')" id="m-btn-dashboard" class="flex flex-col items-center gap-1 text-emerald-800">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
        <span class="text-[10px] font-bold">Dashboard</span>
      </button>
      <button onclick="switchTab('inventory')" id="m-btn-inventory" class="flex flex-col items-center gap-1 text-slate-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        <span class="text-[10px]">รายการ</span>
      </button>
    </nav>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    let globalData = [];
    let charts = {};
    let currentTab = 'dashboard';
    let isMobile = window.innerWidth < 768;

    window.addEventListener('resize', () => {
      const newIsMobile = window.innerWidth < 768;
      if(newIsMobile !== isMobile) {
        isMobile = newIsMobile;
        switchTab(currentTab);
      }
    });

    async function fetchData() {
      try {
        const response = await fetch(WEB_APP_URL);
        globalData = await response.json();
        if (globalData.error) throw new Error(globalData.error);
        await switchTab('dashboard');
      } catch (err) {
        document.getElementById('loading-text').innerHTML = `<span class="text-red-600">${err.message}</span>`;
      }
    }

    async function switchTab(tabId) {
      currentTab = tabId;
      const mainContent = document.getElementById('main-content');
      const prefix = isMobile ? 'm_' : 'd_';
      const fileToLoad = tabId === 'dashboard' ? `${prefix}dashboard.html` : `${prefix}assets-list.html`;
      
      try {
        const response = await fetch(fileToLoad);
        const html = await response.text();
        mainContent.innerHTML = html;

        updateNavUI(tabId);
        
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => { document.getElementById('loading').classList.add('hidden'); }, 500);

        renderContent();
      } catch (err) {
        console.error("Load error:", err);
      }
    }

    function updateNavUI(tabId) {
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      const desktopBtn = document.getElementById('btn-' + tabId);
      if(desktopBtn) desktopBtn.classList.add('active');

      const mDash = document.getElementById('m-btn-dashboard');
      const mInv = document.getElementById('m-btn-inventory');
      if(mDash && mInv) {
        if(tabId === 'dashboard') {
          mDash.classList.add('text-emerald-800'); mDash.classList.remove('text-slate-400');
          mInv.classList.add('text-slate-400'); mInv.classList.remove('text-emerald-800');
        } else {
          mInv.classList.add('text-emerald-800'); mInv.classList.remove('text-slate-400');
          mDash.classList.add('text-slate-400'); mDash.classList.remove('text-emerald-800');
        }
      }
      
      document.getElementById('page-title').innerText = tabId === 'dashboard' ? 'Dashboard' : 'รายการทรัพย์สิน';
    }

    function renderContent() {
      if (currentTab === 'dashboard') {
        renderDashboard();
      } else {
        renderTable(globalData);
      }
    }

    function renderDashboard() {
      const total = globalData.length;
      const normal = globalData.filter(d => ['ปกติ','ใช้งานได้','พร้อมใช้'].some(s => String(d.status).includes(s))).length;
      const broken = globalData.filter(d => ['ชำรุด','จำหน่าย','พัง','ซ่อม'].some(s => String(d.status).includes(s))).length;

      ['total-val', 'normal-val', 'broken-val'].forEach((id, idx) => {
        const el = document.getElementById(id);
        if(el) el.innerText = [total, normal, broken][idx].toLocaleString();
      });

      const typeData = groupAndSort(globalData, 'type', isMobile ? 5 : 10);
      const deptData = groupAndSort(globalData, 'dept', isMobile ? 5 : 8);

      updateChart('typeChart', 'doughnut', Object.keys(typeData), Object.values(typeData), ['#064e3b', '#059669', '#10b981', '#6ee7b7', '#d1fae5']);
      updateChart('deptChart', isMobile ? 'horizontalBar' : 'bar', Object.keys(deptData), Object.values(deptData), '#059669');
    }

    function renderTable(data) {
      const container = document.getElementById('table-body') || document.getElementById('mobile-list-container');
      if(!container) return;

      if(isMobile) {
        container.innerHTML = data.map(item => `
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3">
            <div class="flex justify-between items-start mb-2">
              <span class="text-[10px] font-bold text-slate-400 font-mono">${item.id}</span>
              <div class="flex gap-2">
                ${item.url ? `<a href="${item.url}" target="_blank" class="text-emerald-600 p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></a>` : ''}
                <span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${['ปกติ','ใช้งานได้'].some(s => String(item.status).includes(s)) ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}">${item.status}</span>
              </div>
            </div>
            <div class="font-bold text-slate-800 text-sm mb-1">${item.type}</div>
            <div class="text-xs text-slate-500 mb-3">${item.brand || ''} ${item.model || ''}</div>
            <div class="flex justify-between items-center pt-3 border-t border-slate-50">
              <div class="text-[10px] leading-tight">
                <div class="text-slate-500 font-semibold">${item.dept}</div>
                <div class="text-slate-400">${item.owner || '-'}</div>
              </div>
              <div class="font-mono font-bold text-emerald-700 text-sm">฿${Number(item.value).toLocaleString()}</div>
            </div>
          </div>
        `).join('');
      } else {
        container.innerHTML = data.map(item => `
          <tr class="hover:bg-emerald-50/40 transition">
            <td class="px-6 py-4 font-mono text-[11px] text-slate-500 font-bold">${item.id}</td>
            <td class="px-6 py-4 font-bold text-slate-700">${item.type}</td>
            <td class="px-6 py-4 text-xs text-slate-600">
               <div class="font-semibold">${item.brand || ''}</div>
               <div class="text-[10px] text-slate-400">${item.model || ''}</div>
            </td>
            <td class="px-6 py-4 text-right font-mono">฿${Number(item.value).toLocaleString()}</td>
            <td class="px-6 py-4 text-xs">
               <div class="font-semibold text-slate-700">${item.dept}</div>
               <div class="text-[10px] text-slate-400 italic">${item.owner || '-'}</div>
            </td>
            <td class="px-6 py-4 text-center">
              <span class="px-3 py-1 rounded-full text-[10px] font-bold ${['ปกติ','ใช้งานได้'].some(s => String(item.status).includes(s)) ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}">${item.status}</span>
            </td>
            <td class="px-6 py-4 text-center">
              ${item.url ? `
                <a href="${item.url}" target="_blank" class="inline-flex p-2 text-[#12643a] hover:bg-emerald-50 rounded-full transition">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
              ` : '<span class="text-slate-300">-</span>'}
            </td>
          </tr>
        `).join('');
      }
    }

    function groupAndSort(data, key, limit) {
      const counts = data.reduce((acc, curr) => {
        const val = curr[key] || 'ไม่ระบุ';
        acc[val] = (acc[val] || 0) + 1;
        return acc;
      }, {});
      return Object.fromEntries(Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, limit));
    }

    function updateChart(id, type, labels, data, colors) {
      const canvas = document.getElementById(id);
      if(!canvas) return;
      if (charts[id]) charts[id].destroy();
      
      const chartType = type === 'horizontalBar' ? 'bar' : type;
      const indexAxis = type === 'horizontalBar' ? 'y' : 'x';

      charts[id] = new Chart(canvas.getContext('2d'), {
        type: chartType,
        data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 5 }] },
        options: {
          indexAxis: indexAxis,
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: type === 'doughnut', position: 'bottom', labels: { font: { family: 'Sarabun', size: 10 } } } }
        }
      });
    }

    function filterTable() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const filtered = globalData.filter(item => 
        item.id.toLowerCase().includes(input) || 
        item.type.toLowerCase().includes(input) || 
        item.dept.toLowerCase().includes(input) ||
        (item.owner && item.owner.toLowerCase().includes(input))
      );
      renderTable(filtered);
    }
    window.onload = fetchData;
  </script>
</body>
</html>
