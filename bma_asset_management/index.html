<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Smart Asset Management</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a34a">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        #loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">BMA Smart Asset</p>
        </div>
    </div>

    <div id="app-container"></div>

    <!-- ลำดับสคริปต์สำคัญมาก -->
    <script src="js/api-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        async function loadPage(page) {
            const container = document.getElementById('app-container');
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
                const target = (!isLoggedIn && page !== 'login') ? 'login' : page;

                // ตรวจสอบว่าไฟล์ .html อยู่ในตำแหน่งที่ถูกต้อง
                const response = await fetch(`${target}.html`);
                if (!response.ok) throw new Error(`ไม่พบไฟล์ ${target}.html`);
                
                const html = await response.text();
                container.innerHTML = html;
                
                window.location.hash = `#/${target}`;
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-10 text-center">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                        <h2 class="text-xl font-bold text-slate-800">เกิดข้อผิดพลาดในการโหลดหน้าจอ</h2>
                        <p class="text-slate-500 mt-2">${err.message}</p>
                        <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-green-600 text-white rounded-xl">ลองใหม่อีกครั้ง</button>
                    </div>`;
            } finally {
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }

        window.onload = () => {
            const page = window.location.hash.replace('#/', '') || 'login';
            loadPage(page);
        };

        window.onhashchange = () => {
            const page = window.location.hash.replace('#/', '');
            if (page) loadPage(page);
        };
    </script>
</body>
</html>
