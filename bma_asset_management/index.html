<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Assets Management - ระบบจัดการทรัพย์สิน กทม.</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12643a">
    
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bma: '#12643a', bmaLight: '#059669' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col md:flex-row font-['Sarabun'] overflow-hidden">

    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="spinner mb-6"></div>
        <p id="loading-text" class="text-slate-500 font-bold animate-pulse">กำลังดึงข้อมูลทรัพย์สินจากระบบ...</p>
    </div>

    <!-- Sidebar (Desktop) -->
    <nav id="sidebar" class="hidden md:flex flex-col w-72 bkk-sidebar bg-bma text-white p-8 space-y-4 shadow-xl h-screen sticky top-0">
        <div class="flex items-center justify-between mb-10 px-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-emerald-800 font-black text-xl">B</div>
                <div class="sidebar-title-text">
                    <h1 class="text-xl font-bold tracking-tight leading-none">BMA ASSETS</h1>
                    <p class="text-[10px] opacity-60">Management System</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="text-white/40 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
        
        <div class="flex-1 space-y-2">
            <button id="btn-dashboard" onclick="switchTab('dashboard')" 
                    class="nav-link active w-full p-4 rounded-2xl flex items-center gap-4 transition-all duration-200 border-none cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="sidebar-text">ภาพรวมระบบ</span>
            </button>
            <button id="btn-inventory" onclick="switchTab('inventory')" 
                    class="nav-link w-full p-4 rounded-2xl flex items-center gap-4 transition-all duration-200 border-none cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                <span class="sidebar-text">รายการทรัพย์สิน</span>
            </button>
        </div>

        <div class="sidebar-version pt-4 border-t border-white/10">
            <p class="text-[9px] text-white/30 font-medium tracking-widest">VERSION 00040</p>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-h-0 overflow-hidden relative">
        <header class="bg-white border-b border-slate-100 p-6 flex justify-between items-center z-10 flex-shrink-0">
            <h2 id="page-title" class="text-xl font-bold text-slate-800 tracking-tight">Dashboard</h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live System</span>
            </div>
        </header>
        
        <div id="main-content" class="flex-1 overflow-y-auto bg-slate-50/30">
            <!-- ข้อมูลจะถูกฉีดที่นี่ -->
        </div>

        <!-- Mobile Bottom Nav: แก้ไข bg-white เป็น bg-bma และปรับสีปุ่ม -->
        <div class="md:hidden fixed bottom-0 left-0 right-0 bg-bma border-t border-white/10 flex justify-around p-3 pb-6 z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]">
            <button id="m-btn-dashboard" onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1 transition-colors text-white">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                <span class="text-[10px] font-bold">สรุปผล</span>
            </button>
            <button id="m-btn-inventory" onclick="switchTab('inventory')" class="flex flex-col items-center gap-1 text-white/50">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
                <span class="text-[10px] font-bold">รายการ</span>
            </button>
        </div>
    </main>

    <script src="js/api-config.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/assets-list.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
