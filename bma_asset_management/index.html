<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BMA Assets Management v.00033</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
    .nav-link.active { background: rgba(255,255,255,0.15); font-weight: bold; border-left: 4px solid #10b981; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

  <!-- หน้าจอโหลดข้อมูล -->
  <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[100] transition-opacity duration-500">
    <div class="spinner mb-4"></div>
    <p id="loading-text" class="text-emerald-800 font-bold">กำลังเชื่อมต่อข้อมูล BMA Assets...</p>
  </div>

  <!-- แถบเมนูข้าง (เฉพาะ Desktop) -->
  <aside class="w-64 bg-[#12643a] text-white flex-shrink-0 hidden md:flex flex-col">
    <div class="p-6 flex items-center gap-3 border-b border-emerald-700/50">
      <h1 class="font-bold text-lg">BMA Assets</h1>
    </div>
    <nav class="flex-1 p-4 space-y-2 mt-4">
      <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-left">Dashboard</button>
      <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-left">รายการทรัพย์สิน</button>
    </nav>
  </aside>

  <!-- ส่วนแสดงผลหลัก -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6">
      <h2 id="page-title" class="font-bold text-slate-700">Dashboard</h2>
      <div id="status-indicator" class="text-[10px] text-emerald-600 font-bold bg-emerald-50 px-3 py-1 rounded-full">CONNECTED</div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto">
      <!-- เนื้อหาจะถูกฉีดเข้ามาผ่านฟังก์ชันใน index.js -->
    </main>

    <!-- เมนูล่าง (เฉพาะ Mobile) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-3 z-50">
      <button onclick="switchTab('dashboard')" id="m-btn-dashboard" class="flex flex-col items-center text-emerald-800">
        <span class="text-[10px] font-bold">Dashboard</span>
      </button>
      <button onclick="switchTab('inventory')" id="m-btn-inventory" class="flex flex-col items-center text-slate-400">
        <span class="text-[10px] font-bold">รายการ</span>
      </button>
    </nav>
  </div>

  <script src="js/api-config.js"></script>
  <!-- โหลดไฟล์ Logic ประจำหน้าทิ้งไว้เพื่อให้ฟังก์ชันพร้อมใช้งาน -->
  <script src="js/d_dashboard.js"></script>
  <script src="js/d_assets-list.js"></script>
  <script src="js/m_dashboard.js"></script>
  <script src="js/m_assets-list.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
